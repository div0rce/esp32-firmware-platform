name: PlatformIO CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  esp-idf-builds:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        execution_model:
          - rtos
          - cooperative
    env:
      IDF_VERSION: v5.2.5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ESP-IDF prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            ccache \
            cmake \
            dfu-util \
            flex \
            gperf \
            libffi-dev \
            libssl-dev \
            libusb-1.0-0 \
            ninja-build \
            python3 \
            python3-pip \
            python3-venv \
            wget

      - name: Install ESP-IDF
        run: |
          mkdir -p "$HOME/esp"
          git clone \
            --depth 1 \
            --branch "$IDF_VERSION" \
            --recursive \
            --shallow-submodules \
            https://github.com/espressif/esp-idf.git \
            "$HOME/esp/esp-idf"
          "$HOME/esp/esp-idf/install.sh" esp32s3

      - name: Check app core include boundary
        run: scripts/check_app_core_includes.sh

      - name: Build ESP-IDF ${{ matrix.execution_model }} backend
        shell: bash
        run: |
          . "$HOME/esp/esp-idf/export.sh"
          idf.py \
            -B "build-${{ matrix.execution_model }}" \
            -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.ci.${{ matrix.execution_model }}" \
            set-target esp32s3 build

  firmware-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Check source hygiene
        run: |
          test ! -e src/fault_state.cpp
          test ! -e src/sensor_math.cpp
          test ! -e src/telemetry_format.cpp

      - name: Check app core include boundary
        run: scripts/check_app_core_includes.sh

      - name: Build XIAO ESP32S3 firmware
        run: platformio run -e seeed_xiao_esp32s3

  native-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Check source hygiene
        run: |
          test ! -e src/fault_state.cpp
          test ! -e src/sensor_math.cpp
          test ! -e src/telemetry_format.cpp

      - name: Check app core include boundary
        run: scripts/check_app_core_includes.sh

      - name: Run native tests
        run: platformio test -e native

  wokwi-runtime:
    runs-on: ubuntu-latest
    env:
      WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: python -m pip install --upgrade pip platformio

      - name: Install Wokwi CLI
        run: |
          curl -L https://wokwi.com/ci/install.sh | sh
          echo "$HOME/bin" >> "$GITHUB_PATH"
          echo "$HOME/.wokwi/bin" >> "$GITHUB_PATH"

      - name: Run Wokwi runtime check
        run: scripts/wokwi_runtime_check.sh
