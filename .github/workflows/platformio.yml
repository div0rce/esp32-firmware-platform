name: PlatformIO CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  firmware-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Check source hygiene
        run: |
          test ! -e src/fault_state.cpp
          test ! -e src/sensor_math.cpp
          test ! -e src/telemetry_format.cpp

      - name: Build ESP32 firmware
        run: platformio run -e esp32dev

  native-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Check source hygiene
        run: |
          test ! -e src/fault_state.cpp
          test ! -e src/sensor_math.cpp
          test ! -e src/telemetry_format.cpp

      - name: Run native tests
        run: platformio test -e native
