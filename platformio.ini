[platformio]
default_envs =
    seeed_xiao_esp32s3

[common]
esp32_platform = espressif32 @ 6.13.0
esp32_framework = arduino
esp32_monitor_speed = 115200
esp32_build_src_flags =
    -Wall
    -Wextra
    -Werror
    -Wshadow
esp32_build_src_filter =
    +<*>
    -<fault_state.cpp>
    -<sensor_math.cpp>
    -<telemetry_format.cpp>

[env:seeed_xiao_esp32s3]
platform = ${common.esp32_platform}
board = seeed_xiao_esp32s3
framework = ${common.esp32_framework}
monitor_speed = ${common.esp32_monitor_speed}
build_src_flags = ${common.esp32_build_src_flags}
build_src_filter = ${common.esp32_build_src_filter}

[env:seeed_xiao_esp32s3_trace]
extends = env:seeed_xiao_esp32s3
build_src_flags =
    ${common.esp32_build_src_flags}
    -DENABLE_TRACE_PINS

[env:esp32dev]
platform = ${common.esp32_platform}
board = esp32dev
framework = ${common.esp32_framework}
monitor_speed = ${common.esp32_monitor_speed}
build_src_flags =
    ${common.esp32_build_src_flags}
    -DUSE_ESP32DEV_PINMAP
build_src_filter = ${common.esp32_build_src_filter}

[env:native]
platform = native
test_build_src = yes
build_flags =
    -Wall
    -Wextra
    -Werror
    -Wshadow
build_src_filter =
    -<*>
    +<fault_state.c>
    +<sensor_math.c>
    +<telemetry_format.c>
    +<state_machine.c>
    +<time_utils.c>
