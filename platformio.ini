[env:esp32dev]
platform = espressif32 @ 6.13.0
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_flags =
    -Wall
    -Wextra
    -Werror
    -Wshadow
build_src_filter =
    +<*>
    -<fault_state.cpp>
    -<sensor_math.cpp>
    -<telemetry_format.cpp>

[env:native]
platform = native
test_build_src = yes
build_flags =
    -Wall
    -Wextra
    -Werror
    -std=c++17
build_src_filter =
    -<*>
    +<fault_state.c>
    +<sensor_math.c>
    +<telemetry_format.c>
    +<state_machine.c>
    +<time_utils.c>
